<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>nen · creative toolkit</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="wrap">
  <div class="kicker">nen · internal</div>
  <div class="title">creative toolkit</div>

  <div class="tabs">
    <button class="tab active" data-v="img" onclick="tab('img')">image search</button>
    <button class="tab" data-v="vids" onclick="tab('vids')">all videos</button>
  </div>

  <!-- ===== IMAGE SEARCH ===== -->
  <div id="view-img" class="view">
    <div class="ver">search every nen frame — paste a script line, or describe what you want to see on screen</div>
    <div class="srow">
      <input id="iq" placeholder="founder on a laptop · $25M raised · city skyline · dashboard with charts · logo wall...">
      <button class="build sbtn" onclick="isearch()">search →</button>
    </div>
    <div class="det" id="idet"></div>
    <div id="igrid" class="igrid"></div>
  </div>

  <!-- ===== ALL VIDEOS ===== -->
  <div id="view-vids" class="view" style="display:none">
    <div class="ver">every nen video — click any to open its full script</div>
    <div class="det" id="vdet"></div>
    <div id="vgrid" class="hgrid"></div>
  </div>
</div>

<!-- lightbox -->
<div id="lb" class="lb" onclick="closeLb(event)">
  <div class="lbx" onclick="event.stopPropagation()">
    <img id="lbimg" src="">
    <div class="info">
      <div class="bn" id="lbbn"></div>
      <div class="ln" id="lbln"></div>
      <div class="tg" id="lbtg"></div>
      <div class="acts">
        <button class="lbtn" onclick="copyImg()">copy image</button>
        <a class="lbtn" id="lbdl" href="" download>download</a>
        <button class="lbtn" onclick="allFrames()">all frames in this video →</button>
        <a class="lbtn" id="lbscript" href="">open full script →</a>
        <span class="lbmsg" id="lbmsg"></span>
      </div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let VLOADED=false;
function tab(v){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  $('view-img').style.display = v==='img'?'block':'none';
  $('view-vids').style.display = v==='vids'?'block':'none';
  if(v==='vids' && !VLOADED){ VLOADED=true; loadVideos(); }
}

/* ---- all videos list ---- */
async function loadVideos(){
  $('vdet').textContent='loading…';
  const d=await (await fetch('/api/videos')).json();
  $('vdet').textContent=`${d.count} videos`;
  $('vgrid').innerHTML=d.videos.map(v=>`<a class="hcard" href="/script?vid=${encodeURIComponent(v.vid)}">
    <img loading="lazy" src="/frame?vid=${encodeURIComponent(v.vid)}&sec=${v.hero_sec}&w=440">
    <div class="b"><div class="bn">${esc(v.brand)}</div>
    <div class="q">${esc(v.broad)}${v.fine?' — '+esc(v.fine):''}</div></div></a>`).join('');
}

/* ---- image search ---- */
let IRES=[], CUR=null;
const masterURL=x=>'/img?id='+encodeURIComponent(x.id)+'&w=1100';
function renderGrid(list){
  IRES=list||[];
  $('igrid').innerHTML=IRES.map((x,i)=>`<div class="icard" onclick="openLb(${i})">
    <img loading="lazy" src="/img?id=${encodeURIComponent(x.id)}&w=440">
    <div class="m"><div class="mb">${esc(x.brand)} · ${x.t}</div>
    <div class="ml">${esc(x.line||x.tags.join(', '))}</div></div></div>`).join('');
}
async function isearch(){
  const q=$('iq').value.trim();
  if(!q){$('igrid').innerHTML='';$('idet').textContent='type what you’re looking for.';return;}
  $('idet').textContent='searching…'; $('igrid').innerHTML='';
  const r=await fetch('/api/image_search?q='+encodeURIComponent(q)+'&k=50');
  const d=await r.json();
  if(!(d.results||[]).length){renderGrid([]);$('idet').textContent=`no matches in ${d.count} frames — try simpler words or a script line.`;return;}
  $('idet').textContent=`${d.results.length} of ${d.count} frames`;
  renderGrid(d.results);
}
function openLb(i){
  const x=IRES[i]; if(!x)return; CUR=x;
  $('lbimg').src=masterURL(x);
  $('lbbn').textContent=[x.brand,x.arch,x.t].filter(Boolean).join(' · ');
  $('lbln').textContent=x.line||'';
  $('lbtg').textContent=(x.tags||[]).join('  ·  ');
  const dl=$('lbdl'); dl.href=masterURL(x); dl.setAttribute('download',x.id+'.jpg');
  $('lbscript').href='/script?vid='+encodeURIComponent(x.vid);
  $('lbmsg').textContent='';
  $('lb').classList.add('on');
}
function closeLb(e){$('lb').classList.remove('on');}
function flash(m){$('lbmsg').textContent=m; setTimeout(()=>{if($('lbmsg').textContent===m)$('lbmsg').textContent='';},1800);}
async function copyImg(){
  if(!CUR)return; flash('copying…');
  try{
    const blob=await (await fetch(masterURL(CUR))).blob();
    const bmp=await createImageBitmap(blob);
    const c=document.createElement('canvas'); c.width=bmp.width; c.height=bmp.height;
    c.getContext('2d').drawImage(bmp,0,0);
    const png=await new Promise(res=>c.toBlob(res,'image/png'));
    await navigator.clipboard.write([new ClipboardItem({'image/png':png})]);
    flash('✓ image copied');
  }catch(e){
    try{await navigator.clipboard.writeText(location.origin+masterURL(CUR)); flash('✓ image link copied');}
    catch(_){flash('copy failed — use download');}
  }
}
async function allFrames(){
  if(!CUR)return; const vid=CUR.vid; closeLb();
  $('idet').textContent='loading frames…'; $('igrid').innerHTML='';
  const d=await (await fetch('/api/video_frames?vid='+encodeURIComponent(vid))).json();
  $('idet').innerHTML=`all ${d.count} frames from <b>${esc(d.brand)}</b> · <a href="#" onclick="$('iq').focus();return false;" style="color:#6f6f6f">new search ↑</a>`;
  renderGrid(d.results); window.scrollTo(0,0);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
$('iq').addEventListener('keydown',e=>{if(e.key==='Enter')isearch();});
</script>
</body></html>
